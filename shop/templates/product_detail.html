<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f3f3f3;
        }

        .container {
            display: flex;
            padding: 40px;
            gap: 40px;
        }

        .container img {
            width: 300px;
            background: white;
            padding: 20px;
        }

        .details {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-size: 22px;
            font-weight: bold;
        }

        .btn {
            padding: 10px 15px;
            background: #ff9900;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <img src="{{ product.image }}">

    <div class="details">
        <h1>{{ product.name }}</h1>
        <p class="price">₹{{ product.price }}</p>
        <p>{{ product.description }}</p>

        <a href="{%url 'add_to_cart' product.id%}" class="btn" >Add to Cart</a>
    </div>
</div>

</body>
</html>
