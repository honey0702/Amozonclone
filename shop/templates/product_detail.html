<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f3f3f3;
        }

        .container {
            display: flex;
            padding: 40px;
            gap: 40px;
            align-items: flex-start;
        }

        .container img {
            width: 300px;
            max-width: 100%;
            background: white;
            padding: 20px;
            object-fit: contain;
            border-radius: 10px;
        }

        .details {
            background: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
        }

        .price {
            color: green;
            font-size: 22px;
            font-weight: bold;
        }

        .btn {
            padding: 10px 15px;
            background: #ff9900;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            color: black;
            border-radius: 5px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 15px;
            }

            .container img {
                width: 100%;
            }

            .details {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <img src="{{ product.image }}">

    <div class="details">
        <h1>{{ product.name }}</h1>
        <p class="price">₹{{ product.price }}</p>
        <p>{{ product.description }}</p>

        <a href="{% url 'add_to_cart' product.id %}" class="btn">
            Add to Cart
        </a>
    </div>

</div>

</body>
</html>
