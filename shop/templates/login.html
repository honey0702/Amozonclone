<!DOCTYPE html>
<html>
<head>
    <title>Sign-In</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f7f8fa, #e6e9f0);
            margin: 0;
        }

        /* Center wrapper */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Login Card */
        .login-box {
            width: 360px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-weight: normal;
        }

        /* Input fields */
        .input-box {
            margin-bottom: 18px;
        }

        .input-box label {
            font-size: 13px;
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #ff9900;
            box-shadow: 0 0 5px rgba(255,153,0,0.5);
            outline: none;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 10px;
            background: #ff9900;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e68a00;
        }

        /* Error */
        .error {
            background: #ffe6e6;
            color: red;
            padding: 8px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Extra links */
        .extra {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .extra a {
            color: #007185;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="wrapper">
    <div class="login-box">

        <div class="logo">
            <h1>amazon</h1>
        </div>

        <h2>Sign-In</h2>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <div class="input-box">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button class="btn" type="submit">Sign-In</button>
        </form>

        <div class="extra">
            <a href="#">Forgot Password?</a>
        </div>

    </div>
</div>

</body>
</html>
